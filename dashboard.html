<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1366, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YOSIEF // DASHBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'FuturaHeavy';
    src: local('Futura Heavy Oblique'), local('Futura-HeavyOblique'), local('Futura Bold Oblique'), local('Futura-BoldOblique');
    font-style: oblique;
    font-weight: 800;
  }
</style>
<style>
    :root {
    --bg: #000000;
    --surface: rgba(28,28,30,0.94);
    --surface2: rgba(44,44,46,0.8);
    --surface3: rgba(58,58,60,0.6);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --accent: #0A84FF;
    --accent2: #30D158;
    --accent3: #FF9F0A;
    --accent-red: #FF453A;
    --text: rgba(255,255,255,0.88);
    --text-dim: rgba(255,255,255,0.40);
    --text-bright: #ffffff;
    --danger: #FF453A;
    --success: #30D158;
    --radius: 13px;
    --radius-lg: 22px;
    --radius-xl: 28px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* NAV - iOS tab bar style */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(18,18,18,0.85);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-top: 0.5px solid var(--border-strong);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 10px;
    z-index: 100;
  }

  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    padding: 6px 40px;
    border-radius: var(--radius);
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    touch-action: manipulation;
  }

  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 30px; height: 30px; }

  /* PAGES — each page is a fixed-height flex column, no scroll */
  .page {
    display: none;
    height: calc(100vh - 68px);
    overflow: hidden;
    padding: 0 16px;
    max-width: 1366px;
    margin: 0 auto;
    box-sizing: border-box;
  }
  .page.active { display: flex; flex-direction: column; }

  /* ===== HOME PAGE ===== */
  .home-header {
    text-align: center;
    padding-top: 14px;
    padding-bottom: 10px;
    flex-shrink: 0;
  }

  .greeting {
    font-size: 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    color: var(--text-bright);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .time-display {
    font-size: 72px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    line-height: 1;
    color: var(--text-bright);
    letter-spacing: -4px;
  }

  .date-display {
    font-size: 20px;
    color: var(--text-bright);
    margin-top: 2px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    letter-spacing: 0.2px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-areas:
      "weather events"
      "medicine events";
    gap: 10px;
    flex: 1;
    min-height: 0;
    padding-bottom: 20px;
  }

  /* iOS frosted glass card */
  .card {
    background: var(--surface);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 14px;
    position: relative;
    overflow: hidden;
  }

  .card-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .weather-temp {
    font-size: 48px;
    font-weight: 800;
    color: var(--text-bright);
    line-height: 1;
    font-family: 'Syne', sans-serif;
    letter-spacing: -1px;
  }

  .weather-desc {
    font-size: 15px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 600;
  }

  .weather-details {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .weather-detail {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 5px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
  }

  .refresh-btn {
    position: absolute;
    top: 14px; right: 14px;
    background: var(--surface2);
    border: 0.5px solid var(--border-strong);
    border-radius: 50%;
    color: var(--text-dim);
    cursor: pointer;
    padding: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    touch-action: manipulation;
    width: 32px; height: 32px;
  }

  .refresh-btn:active { transform: scale(0.92); }
  .refresh-btn svg { width: 14px; height: 14px; }

  .events-list { list-style: none; }

  .event-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 13px;
    margin-bottom: 7px;
    background: rgba(10,132,255,0.12);
    border: 0.5px solid rgba(10,132,255,0.3);
  }

  .event-item.reminder {
    background: rgba(255,159,10,0.12);
    border-color: rgba(255,159,10,0.3);
  }

  .event-item:last-child { margin-bottom: 0; }

  .event-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .event-dot.reminder { background: var(--accent3); }

  .event-time {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    width: 58px;
  }

  .event-item.reminder .event-time { color: var(--accent3); }

  .event-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-bright);
    line-height: 1.3;
  }

  .empty-events {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-align: center;
    padding: 16px 0;
  }

  /* BRIEFING - iOS widget style */
  .briefing-card {
    background: linear-gradient(145deg, rgba(10,132,255,0.15), rgba(48,209,88,0.08));
    border: 0.5px solid rgba(10,132,255,0.3);
    backdrop-filter: blur(40px);
    border-radius: var(--radius-lg);
    padding: 14px;
    margin-bottom: 0;
  }

  .briefing-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .briefing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
  }

  .briefing-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .briefing-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    font-weight: 500;
  }

  .briefing-btn {
    margin-top: 8px;
    background: rgba(10,132,255,0.18);
    border: 0.5px solid rgba(10,132,255,0.35);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 9px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
    touch-action: manipulation;
  }

  .briefing-btn:active { transform: scale(0.98); opacity: 0.85; }

  /* ===== CALENDAR PAGE ===== */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    margin: 16px 0 12px;
    flex-shrink: 0;
    border-radius: 22px;
    border: 0.5px solid rgba(255,255,255,0.12);
    transition: background 0.4s ease, border-color 0.4s ease;
  }

  .cal-month {
    font-size: 34px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.35);
  }

  .cal-arrow {
    background: rgba(0,0,0,0.2);
    border: 0.5px solid rgba(255,255,255,0.18);
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    font-size: 26px;
    transition: all 0.15s;
    touch-action: manipulation;
    width: 62px; height: 62px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  .cal-arrow:active { transform: scale(0.92); opacity: 0.8; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: 40px repeat(6, 1fr);
    gap: 6px;
    flex: 1;
    min-height: 0;
    padding-bottom: 20px;
    align-content: stretch;
  }

  .cal-day-header {
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    border: 0.5px solid rgba(255,255,255,0.08);
  }

  .cal-day {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    font-size: 28px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    touch-action: manipulation;
    border: 0.5px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
  }

  .cal-day:active { transform: scale(0.92); }
  .cal-day.other-month { color: var(--text-dim); opacity: 0.28; }
  .cal-day.today { background: var(--accent); color: #fff; font-weight: 800; border-radius: 12px; }
  .cal-day.selected { background: var(--surface2); color: var(--text-bright); border: 1.5px solid var(--accent); border-radius: 12px; }

  .cal-day-dots {
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 3px;
  }

  .cal-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cal-dot.event { background: #0A84FF; }
  .cal-dot.reminder { background: #FF9F0A; }
  .cal-day.today .cal-dot { opacity: 0.85; }

  /* ADD EVENT FORM */
  .add-event-section {
    background: var(--surface);
    backdrop-filter: blur(40px);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 18px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--text-bright);
    margin-bottom: 16px;
    letter-spacing: -0.3px;
  }

  .form-group { margin-bottom: 12px; }

  .form-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    color: var(--text-bright);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s;
    min-height: 52px;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
  }

  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text-dim); font-weight: 500; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .type-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    background: var(--surface2);
    padding: 4px;
    border-radius: var(--radius);
  }

  .type-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
    min-height: 40px;
  }

  .type-btn.active-event { background: var(--accent); color: #fff; }
  .type-btn.active-reminder { background: var(--accent3); color: #fff; }

  .submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
    min-height: 52px;
    letter-spacing: 0.3px;
  }

  .submit-btn:active { transform: scale(0.98); opacity: 0.85; }

  /* EVENTS LIST */
  .events-section {
    background: var(--surface);
    backdrop-filter: blur(40px);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 14px;
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
    min-height: 0;
  }
  .events-section::-webkit-scrollbar { display: none; }

  .event-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    background: var(--surface2);
    border-radius: var(--radius);
    margin-bottom: 8px;
    border-left: 3px solid var(--accent);
  }

  .event-card.reminder { border-left-color: var(--accent3); }
  .event-card-info { flex: 1; }

  .event-card-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 3px;
  }

  .event-card-meta {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .delete-btn {
    background: rgba(255,69,58,0.12);
    border: none;
    border-radius: 8px;
    color: var(--accent-red);
    cursor: pointer;
    padding: 8px;
    transition: all 0.15s;
    touch-action: manipulation;
    min-width: 36px;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .delete-btn:active { transform: scale(0.9); }

  /* ===== CHAT PAGE ===== */
  .chat-container {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 100px;
    scrollbar-width: none;
  }

  .chat-messages::-webkit-scrollbar { display: none; }

  .message {
    margin-bottom: 4px;
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-items: flex-end; }
  .message.assistant { align-items: flex-start; }

  .message-bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 20px;
    font-size: 16px;
    line-height: 1.5;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .message.user .message-bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 5px;
    font-weight: 600;
  }

  .message.assistant .message-bubble {
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    color: var(--text);
    border-bottom-left-radius: 5px;
  }

  .message-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    padding: 0 4px;
    text-transform: uppercase;
  }

  .chat-input-area {
    position: fixed;
    bottom: 80px;
    left: 0; right: 0;
    display: flex;
    gap: 10px;
    padding: 10px 20px;
    align-items: flex-end;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 60%, transparent);
    z-index: 50;
  }

  .chat-input {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: 22px;
    color: var(--text-bright);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 500;
    padding: 13px 18px;
    outline: none;
    resize: none;
    min-height: 50px;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }

  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--text-dim); }

  .send-btn {
    background: var(--accent);
    border: none;
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
    width: 50px; height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .thinking {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: 20px;
    border-bottom-left-radius: 5px;
    width: fit-content;
    margin-bottom: 4px;
  }

  .thinking span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .model-status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding: 10px 14px;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: 22px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .status-dot.online { background: var(--success); }

  .status-text {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
  }

  #day-popup {
    transition: opacity 0.25s ease, transform 0.3s cubic-bezier(0.32,0.72,0,1);
  }
  #day-popup-overlay {
    transition: opacity 0.25s ease;
  }
  #add-modal-overlay {
    transition: opacity 0.25s ease;
  }
  #add-modal-inner {
    transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
  }


  /* TOAST - iOS style */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: rgba(44,44,46,0.95);
    backdrop-filter: blur(40px);
    color: var(--text-bright);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px 22px;
    border-radius: 22px;
    z-index: 9999;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    border: 0.5px solid var(--border-strong);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== CUSTOM KEYBOARD ===== */
  .kb-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 640;
    background: transparent;
  }
  .kb-overlay.active { display: block; }

  .keyboard {
    position: fixed;
    bottom: -100%;
    left: 0; right: 0;
    background: rgba(22,22,26,0.97);
    backdrop-filter: blur(40px) saturate(180%);
    border-top: 0.5px solid rgba(255,255,255,0.14);
    padding: 12px 10px 20px;
    z-index: 650;
    transition: bottom 0.28s cubic-bezier(0.32,0.72,0,1);
    user-select: none;
  }

  .keyboard.active { bottom: 0; }

  .kb-done {
    background: #0A84FF;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    cursor: pointer;
    flex-shrink: 0;
    touch-action: manipulation;
  }

  .kb-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 0 10px;
  }

  .kb-key {
    background: rgba(58,58,60,0.9);
    border: none;
    border-radius: 10px;
    color: #fff;

<script>
// ===== STATE =====
let events = JSON.parse(localStorage.getItem('dashboard-events') || '[]');
let currentEventType = 'event';
let calYear, calMonth, selectedDate;
const today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth();

// ===== NAVIGATION =====
function showPage(page) {
  // Reset calendar to current month when navigating away from it
  const currentActive = document.querySelector('.page.active');
  if (currentActive && currentActive.id === 'page-calendar' && page !== 'calendar') {
    calYear = new Date().getFullYear();
    calMonth = new Date().getMonth();
    selectedDate = null;
  }

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  if (page === 'calendar') renderCalendar();
  if (page === 'chat') checkOllama();
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m + ' ' + ampm;

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date-display').textContent =
    days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ' ' + now.getFullYear();

  const hr = now.getHours();
  let greet = hr < 12 ? 'GOOD MORNING' : hr < 17 ? 'GOOD AFTERNOON' : 'GOOD EVENING';
  document.getElementById('greeting').textContent = greet + ', YOSIEF';
}

setInterval(updateClock, 1000);
updateClock();

// ===== WEATHER =====
const WMO_CODES = {
  0:'Clear sky', 1:'Mostly clear', 2:'Partly cloudy', 3:'Overcast',
  45:'Foggy', 48:'Icy fog', 51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
  61:'Light rain', 63:'Rain', 65:'Heavy rain', 71:'Light snow', 73:'Snow', 75:'Heavy snow',
  77:'Snow grains', 80:'Light showers', 81:'Showers', 82:'Heavy showers',
  85:'Snow showers', 86:'Heavy snow showers', 95:'Thunderstorm', 96:'Thunderstorm w/ hail', 99:'Thunderstorm w/ heavy hail'
};

let weatherHourlyData = null;

async function fetchWeather() {
  try {
    // Winnipeg coords — current + hourly forecast
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=49.8951&longitude=-97.1384&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&hourly=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&temperature_unit=celsius&windspeed_unit=kmh&forecast_days=2');
    const data = await res.json();
    const c = data.current;
    document.getElementById('weather-temp').textContent = Math.round(c.temperature_2m) + '°C';
    document.getElementById('weather-desc').textContent = WMO_CODES[c.weathercode] || 'Unknown';
    document.getElementById('weather-wind').textContent = '💨 ' + Math.round(c.windspeed_10m) + ' km/h';
    document.getElementById('weather-humidity').textContent = '💧 ' + c.relativehumidity_2m + '%';

    // Store full hourly data globally for popup
    weatherHourlyData = data.hourly;

    // Hourly forecast strip — next 5 hours from now
    const nowHour = new Date().getHours();
    const times = data.hourly.time;
    const temps = data.hourly.temperature_2m;
    const codes = data.hourly.weathercode;

    // Find index of next upcoming hour
    const nowISO = new Date().toISOString().slice(0, 13); // "2025-04-22T14"
    let startIdx = times.findIndex(t => t >= nowISO);
    if (startIdx === -1) startIdx = 0;

    const strip = document.getElementById('weather-forecast');
    if (!strip) return;
    strip.innerHTML = '';

    for (let i = startIdx; i < startIdx + 5 && i < times.length; i++) {
      const hour = new Date(times[i]).getHours();
      const ampm = hour >= 12 ? 'PM' : 'AM';
      const h12 = hour % 12 || 12;
      const temp = Math.round(temps[i]);
      const icon = getWeatherIcon(codes[i]);

      const pill = document.createElement('div');
      pill.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;background:rgba(255,255,255,0.05);border-radius:10px;padding:6px 4px;border:0.5px solid rgba(255,255,255,0.08);';
      pill.innerHTML = `
        <span style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);">${h12}${ampm}</span>
        <span style="font-size:18px;line-height:1;">${icon}</span>
        <span style="font-size:12px;font-weight:700;color:#fff;">${temp}°</span>
      `;
      strip.appendChild(pill);
    }
  } catch(e) {
    document.getElementById('weather-desc').textContent = 'Offline';
  }
}

function getWeatherIcon(code) {
  if (code === 0) return '☀️';
  if (code === 1) return '🌤️';
  if (code === 2) return '⛅';
  if (code === 3) return '☁️';
  if (code <= 48) return '🌫️';
  if (code <= 55) return '🌦️';
  if (code <= 65) return '🌧️';
  if (code <= 77) return '❄️';
  if (code <= 82) return '🌧️';
  if (code <= 86) return '🌨️';
  return '⛈️';
}

let weatherActiveTab = 'today';

function buildWeatherRows(entries) {
  // Pad to exactly 24 if fewer entries (e.g. today starting mid-day)
  while (entries.length < 24) entries.push({ h12:'--', ampm:'', icon:'', temp:'--', desc:'', wind:'--', humid:'--' });
  entries = entries.slice(0, 24);

  const cells = entries.map(e => `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.09);border-radius:14px;padding:6px 4px;min-height:0;overflow:hidden;">
      <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);line-height:1;">${e.h12}${e.ampm}</div>
      <div style="font-size:24px;line-height:1;">${e.icon}</div>
      <div style="font-size:18px;font-weight:800;color:#fff;line-height:1;">${e.temp}°</div>
      <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.45);text-align:center;line-height:1.2;overflow:hidden;max-height:2.4em;">${e.desc}</div>
      <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);line-height:1;">💨${e.wind}</div>
      <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);line-height:1;">💧${e.humid}%</div>
    </div>`).join('');

  return `<div style="display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(4,1fr);gap:6px;width:100%;height:100%;">${cells}</div>`;
}

function getWeatherEntries(tab) {
  if (!weatherHourlyData) return [];
  const times  = weatherHourlyData.time;
  const temps  = weatherHourlyData.temperature_2m;
  const codes  = weatherHourlyData.weathercode;
  const winds  = weatherHourlyData.windspeed_10m;
  const humids = weatherHourlyData.relativehumidity_2m;

  const now    = new Date();
  const todayStr    = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const tomorrow    = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  const tomorrowStr = tomorrow.getFullYear() + '-' + String(tomorrow.getMonth()+1).padStart(2,'0') + '-' + String(tomorrow.getDate()).padStart(2,'0');
  const filterDate  = tab === 'today' ? todayStr : tomorrowStr;

  const entries = [];
  for (let i = 0; i < times.length; i++) {
    if (!times[i].startsWith(filterDate)) continue;
    const dt   = new Date(times[i]);
    const hour = dt.getHours();
    entries.push({
      h12:  hour % 12 || 12,
      ampm: hour >= 12 ? 'PM' : 'AM',
      icon: getWeatherIcon(codes[i]),
      temp: Math.round(temps[i]),
      desc: WMO_CODES[codes[i]] || '',
      wind: winds  ? Math.round(winds[i])  : '--',
      humid: humids ? humids[i] : '--',
    });
  }
  return entries;
}

function switchWeatherTab(tab) {
  weatherActiveTab = tab;
  const todayBtn    = document.getElementById('wtab-today');
  const tomorrowBtn = document.getElementById('wtab-tomorrow');
  todayBtn.style.background    = tab === 'today'    ? '#0A84FF' : 'transparent';
  todayBtn.style.color         = tab === 'today'    ? '#fff'    : 'rgba(255,255,255,0.4)';
  tomorrowBtn.style.background = tab === 'tomorrow' ? '#0A84FF' : 'transparent';
  tomorrowBtn.style.color      = tab === 'tomorrow' ? '#fff'    : 'rgba(255,255,255,0.4)';

  const entries = getWeatherEntries(tab);
  const content = document.getElementById('weather-popup-content');
  content.innerHTML = buildWeatherRows(entries);
}

function openWeatherPopup() {
  if (!weatherHourlyData) { showToast('Weather data not loaded yet'); return; }

  weatherActiveTab = 'today';
  const todayBtn    = document.getElementById('wtab-today');
  const tomorrowBtn = document.getElementById('wtab-tomorrow');

  if (tomorrowBtn) { tomorrowBtn.style.background = 'transparent'; tomorrowBtn.style.color = 'rgba(255,255,255,0.4)'; }

function getLocalDateStr() {

  return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0');
}

function renderTodayEvents() {
  const todayStr = getLocalDateStr();
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // 7-day window
  const n = new Date();
  const weekEnd = new Date(n.getFullYear(), n.getMonth(), n.getDate() + 7);
  const weekEndStr = weekEnd.getFullYear() + '-' + String(weekEnd.getMonth()+1).padStart(2,'0') + '-' + String(weekEnd.getDate()).padStart(2,'0');

  const allEvents = events
    .filter(e => e.date >= todayStr && e.date <= weekEndStr)
    .sort((a, b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      const at = a.time || '99:99';
      const bt = b.time || '99:99';
      return at.localeCompare(bt);
    });

  const el = document.getElementById('today-events');
  if (allEvents.length === 0) {
    el.innerHTML = '<li class="empty-events">No events this week</li>';

  el.innerHTML = allEvents.map(e => {
    const d = new Date(e.date + 'T00:00:00');
    const isToday = e.date === todayStr;
    const dateLabel = isToday ? 'Today' : months[d.getMonth()] + ' ' + d.getDate();
    const isReminder = e.type === 'reminder';
    return `
      <li class="event-item ${isReminder ? 'reminder' : ''}" onclick="openDayFromHome('${e.date}')" style="cursor:pointer;">

function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = months[calMonth] + ' ' + calYear;
  applyMonthTheme(calMonth);

  const grid = document.getElementById('cal-grid');
  // Remove old day cells (keep headers)
  const headers = grid.querySelectorAll('.cal-day-header');
  grid.innerHTML = '';
  headers.forEach(h => grid.appendChild(h));

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  // Prev month days
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = document.createElement('div');
    d.className = 'cal-day other-month';
    d.textContent = daysInPrev - i;
    grid.appendChild(d);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';

    const dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    if (d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear())
      el.classList.add('today');
    if (selectedDate === dateStr)
      el.classList.add('selected');

    // Day number
    const numSpan = document.createElement('span');
    numSpan.textContent = d;
    el.appendChild(numSpan);

    // Dots — blue for events, yellow for reminders, cap at 4 total
    const dayEvents = events.filter(e => e.date === dateStr);
    if (dayEvents.length > 0) {
      const dotContainer = document.createElement('div');
      dotContainer.className = 'cal-day-dots';
      const evCount = Math.min(dayEvents.filter(e => e.type !== 'reminder').length, 3);
      const remCount = Math.min(dayEvents.filter(e => e.type === 'reminder').length, 3);
      const total = Math.min(evCount + remCount, 4);
      // Distribute within cap: events first, then reminders
      let shown = 0;
      for (let i = 0; i < evCount && shown < total; i++, shown++) {
        const dot = document.createElement('div');
        dot.className = 'cal-dot event';
        dotContainer.appendChild(dot);
      }
      for (let i = 0; i < remCount && shown < total; i++, shown++) {
        const dot = document.createElement('div');
        dot.className = 'cal-dot reminder';
        dotContainer.appendChild(dot);
      }
      el.appendChild(dotContainer);
    }

    el.onclick = () => {
      selectedDate = dateStr;
      renderCalendar();
      openDayPopup(dateStr);
    };

    grid.appendChild(el);
  }

  // Next month padding
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++) {
    const d = document.createElement('div');
    d.className = 'cal-day other-month';
    d.textContent = i;
    grid.appendChild(d);
  }
}

async function generateBriefing() {
  const todayStr = today.toISOString().split('T')[0];

    ? todayEvents.map(e => `${e.type}: "${e.title}" at ${e.time || 'no specific time'}`).join(', ')

  const prompt = `Give a brief morning briefing for Yosief. Today is ${todayStr}. Events today: ${eventSummary}. Keep it under 3 sentences. Be direct and warm.`;

  document.getElementById('briefing-text').textContent = 'Generating...';

  try {
    const res = await fetch('http://localhost:11434/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'llama3.2:1b', prompt, stream: false })
    });
    const data = await res.json();
    document.getElementById('briefing-text').textContent = data.response;
  } catch(e) {
    document.getElementById('briefing-text').textContent = 'Could not connect to Ollama. Make sure it is running.';

let chatHistory = [];

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  // Dismiss keyboard and reset chat area position
  dismissKeyboard();

  input.value = '';
  appendMessage('user', msg);

  const thinking = document.createElement('div');
  thinking.className = 'message assistant';
  thinking.id = 'thinking';
  thinking.innerHTML = '<div class="message-label">AI ASSISTANT</div><div class="thinking"><span></span><span></span><span></span></div>';
  document.getElementById('chat-messages').appendChild(thinking);
  scrollChat();

  document.getElementById('send-btn').disabled = true;

  chatHistory.push({ role: 'user', content: msg });

  try {
    const res = await fetch('http://localhost:11434/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama3.2:1b',
        messages: chatHistory,
        stream: false
      })
    });
    const data = await res.json();
    const reply = data.message.content;
    chatHistory.push({ role: 'assistant', content: reply });
    document.getElementById('thinking').remove();
    appendMessage('assistant', reply);
  } catch(e) {
    document.getElementById('thinking').remove();
    appendMessage('assistant', 'Error: Could not reach Ollama. Make sure it is running.');
  }

  document.getElementById('send-btn').disabled = false;
}

function appendMessage(role, content) {
  const el = document.createElement('div');
  el.className = 'message ' + role;
  el.innerHTML = `
    <div class="message-label">${role === 'user' ? 'YOU' : 'AI ASSISTANT'}</div>
    <div class="message-bubble">${content.replace(/\n/g, '<br>')}</div>
  `;
  document.getElementById('chat-messages').appendChild(el);
  scrollChat();
}

function scrollChat() {
  const msgs = document.getElementById('chat-messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function showToast(msg) {
  const t = document.getElementById('toast');

// ===== DAY DETAIL VIEW =====
function showDayDetail(dateStr) {
  const dayEvents = events.filter(e => e.date === dateStr).sort((a,b) => a.time.localeCompare(b.time));
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  
  document.getElementById('day-detail-title').textContent = days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
  
  const container = document.getElementById('day-detail-events');
  if (dayEvents.length === 0) {
    container.innerHTML = '<div class="empty-events">No events this day</div>';
  } else {
    container.innerHTML = dayEvents.map(e => `
      <div class="event-card ${e.type === 'reminder' ? 'reminder' : ''}" style="margin-bottom:8px;">
        <div class="event-card-info">
          <div class="event-card-title">${e.title}</div>
          <div class="event-card-meta">${e.time ? e.time + ' · ' : ''}${e.type.toUpperCase()}${e.notes ? ' · ' + e.notes : ''}</div>
        </div>
        <button class="delete-btn" onclick="deleteEvent(${e.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
          </svg>
        </button>
      </div>
    `).join('');
  }
  document.getElementById('day-detail').style.display = 'block';
}

function closeDayDetail() {
  document.getElementById('day-detail').style.display = 'none';
}

function quickAddEvent() {
  const title = document.getElementById("quick-title").value.trim();
  const time = document.getElementById("quick-time").value;
  const date = document.getElementById("quick-date").value || today.toISOString().split("T")[0];
  if (!title) { showToast("Enter a title"); return; }
  events.push({ id: Date.now(), title, date, time, notes: "", type: quickEventType });
  saveEvents();
  renderTodayEvents();
  renderUpcomingStrip();
  showToast("Added!");
  document.getElementById("quick-title").value = "";
  document.getElementById("quick-time").value = "";
}

function getMedState() {
  const todayStr = new Date().toISOString().split('T')[0];
  const saved = JSON.parse(localStorage.getItem('med-tracker') || '{}');
  if (saved.date !== todayStr) {
    const fresh = { date: todayStr, day: false, night: false };
    localStorage.setItem('med-tracker', JSON.stringify(fresh));
    return fresh;
  }
  return saved;
}

function saveMedState(state) {
  localStorage.setItem('med-tracker', JSON.stringify(state));
}

function renderMedicine() {
  const state = getMedState();
  const now = new Date();
  const hour = now.getHours();
  const CHECK_SVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

  const dayCheck  = document.getElementById('med-day-check');
  const nightCheck = document.getElementById('med-night-check');
  const dayRow    = document.getElementById('med-day-row');
  const nightRow  = document.getElementById('med-night-row');
  const dayIcon   = document.getElementById('med-day-icon');
  const nightIcon = document.getElementById('med-night-icon');

  // Morning: caution if not checked and past noon
  const dayOverdue  = !state.day  && hour >= 12;
  // Night: caution if not checked and past 21:00
  const nightOverdue = !state.night && hour >= 21;

  if (dayCheck) {
    dayCheck.innerHTML = state.day ? CHECK_SVG : '';
    dayCheck.style.background = state.day ? '#30D158' : dayOverdue ? '#FFD60A' : 'transparent';
    dayCheck.style.border = state.day ? '2px solid #30D158' : dayOverdue ? '2px solid #FFD60A' : '2px solid rgba(255,255,255,0.2)';
    if (dayRow) dayRow.style.opacity = state.day ? '0.6' : '1';
  }
  if (dayIcon) dayIcon.innerHTML = dayOverdue && !state.day ? CAUTION_SVG : SUN_SVG;

  if (nightCheck) {
    nightCheck.innerHTML = state.night ? CHECK_SVG : '';
    nightCheck.style.background = state.night ? '#30D158' : nightOverdue ? '#FFD60A' : 'transparent';
    nightCheck.style.border = state.night ? '2px solid #30D158' : nightOverdue ? '2px solid #FFD60A' : '2px solid rgba(255,255,255,0.2)';
    if (nightRow) nightRow.style.opacity = state.night ? '0.6' : '1';
  }
  if (nightIcon) nightIcon.innerHTML = nightOverdue && !state.night ? CAUTION_SVG : MOON_SVG;
}

function toggleMedicine(dose) {
  const state = getMedState();
  state[dose] = !state[dose];
  saveMedState(state);
  renderMedicine();
}

renderMedicine();

// Re-check medicine caution state at noon and 9pm each day
function scheduleMedAlerts() {
  const now = new Date();
  const targets = [12, 21];
  let next = null;
  for (const h of targets) {
    const t = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, 0, 0);
    if (t > now) { next = t; break; }
  }
  if (!next) next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 12, 0, 0);
  setTimeout(() => { renderMedicine(); scheduleMedAlerts(); }, next - now);
}
scheduleMedAlerts();

    loadDailyChallenge();

    scheduleMidnightRefresh(); // reschedule for next night

}

const KB_ROWS = {
  num:  ['1','2','3','4','5','6','7','8','9','0'],
  row1: ['q','w','e','r','t','y','u','i','o','p'],
  row2: ['a','s','d','f','g','h','j','k','l'],
  row3: ['SHIFT','z','x','c','v','b','n','m','DEL'],
  row4: ['@','.','SPACE','!','?']
};

let kbTarget = null;
let kbShift = false;

function buildKeyboard() {
  function makeRow(rowId, keys) {
    const row = document.getElementById(rowId);
    if (!row) return;
    row.innerHTML = '';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'kb-key' + (k === 'SPACE' ? ' space' : k === 'SHIFT' || k === 'DEL' ? ' dark wide' : '');
      btn.textContent = k === 'SPACE' ? 'space' : k === 'SHIFT' ? '⇧' : k === 'DEL' ? '⌫' : k;
      btn.setAttribute('data-key', k);
      btn.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); handleKey(k); }, {passive: false});
      btn.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); handleKey(k); });
      row.appendChild(btn);
    });
  }
  makeRow('kb-row-num', KB_ROWS.num);
  makeRow('kb-row-1', KB_ROWS.row1);
  makeRow('kb-row-2', KB_ROWS.row2);
  makeRow('kb-row-3', KB_ROWS.row3);
  makeRow('kb-row-4', KB_ROWS.row4);
}

function handleKey(k) {
  if (!kbTarget) return;
  const el = kbTarget;
  let val = el.value || '';
  let start = typeof el.selectionStart === 'number' ? el.selectionStart : val.length;
  let end = typeof el.selectionEnd === 'number' ? el.selectionEnd : val.length;

  if (k === 'DEL') {
    if (start !== end) { val = val.slice(0, start) + val.slice(end); el.value = val; el.setSelectionRange(start, start); }
    else if (start > 0) { val = val.slice(0, start-1) + val.slice(start); el.value = val; el.setSelectionRange(start-1, start-1); }
  } else if (k === 'SHIFT') {
    kbShift = !kbShift;
    document.querySelectorAll('#kb-row-1 .kb-key, #kb-row-2 .kb-key').forEach(b => {
      const dk = b.getAttribute('data-key');
      if (dk && dk.length === 1) b.textContent = kbShift ? dk.toUpperCase() : dk;
    });
    return;
  } else if (k === 'SPACE') {
    val = val.slice(0, start) + ' ' + val.slice(end);
    el.value = val; el.setSelectionRange(start+1, start+1);
  } else {
    const char = kbShift ? k.toUpperCase() : k;
    val = val.slice(0, start) + char + val.slice(end);
    el.value = val; el.setSelectionRange(start+char.length, start+char.length);
    if (kbShift) { kbShift = false; }
  }
  el.dispatchEvent(new Event('input', {bubbles: true}));
  updateKbPreview();
}

function updateKbPreview() {
  // Highlight active field with blue border
  document.querySelectorAll('.form-input').forEach(i => i.style.borderColor = '');
  if (kbTarget && kbTarget.classList && kbTarget.classList.contains('form-input')) {
    kbTarget.style.borderColor = '#0A84FF';
  }
}

function showKeyboard(el) {
  kbTarget = el;
  const isTime = el.id === 'event-time';

  // Hide both keyboards first
  document.getElementById('keyboard').classList.remove('active');
  document.getElementById('kb-time').classList.remove('active');

  if (isTime) {
    // Sync AM/PM button state from current value
    const val = el.value || '';
    const hasPM = /pm/i.test(val);
    const amBtn = document.getElementById('kb-am-btn');
    const pmBtn = document.getElementById('kb-pm-btn');
    if (amBtn && pmBtn) {
      amBtn.style.background = !hasPM ? '#0A84FF' : 'rgba(44,44,46,0.8)';
      amBtn.style.borderColor = !hasPM ? '#0A84FF' : 'rgba(255,255,255,0.15)';
      amBtn.style.color = !hasPM ? '#fff' : 'rgba(255,255,255,0.4)';
      pmBtn.style.background = hasPM ? '#0A84FF' : 'rgba(44,44,46,0.8)';
      pmBtn.style.borderColor = hasPM ? '#0A84FF' : 'rgba(255,255,255,0.15)';
      pmBtn.style.color = hasPM ? '#fff' : 'rgba(255,255,255,0.4)';
    }
    // Show/hide AM/PM based on existing hour value
    const digits = timeGetDigits(val);
    const ampmSection = document.getElementById('kb-ampm-section');
    if (ampmSection) {
      const hVal = digits.length >= 2 ? parseInt(digits.slice(0, 2), 10) : 0;
      ampmSection.style.display = (digits.length >= 2 && hVal > 12) ? 'none' : 'flex';
    }
    timeUpdatePreview();
    document.getElementById('kb-time').classList.add('active');
  } else {
    document.getElementById('keyboard').classList.add('active');
  }

  document.getElementById('kb-overlay').classList.add('active');
  updateKbPreview();

  // Shift chat input above keyboard
  const chatInput = document.getElementById('chat-input');
  const chatArea = document.querySelector('.chat-input-area');
  if (el === chatInput && chatArea) {
    chatArea.style.transition = 'bottom 0.28s cubic-bezier(0.32,0.72,0,1)';
    chatArea.style.bottom = '392px';
    const msgs = document.getElementById('chat-messages');
    if (msgs) msgs.style.paddingBottom = '490px';
    setTimeout(() => { if (msgs) msgs.scrollTop = msgs.scrollHeight; }, 50);
  }

  // Shift add-event modal to sit exactly above the keyboard
  const modalIds = ['event-title', 'event-date', 'event-time', 'event-notes'];
  const addModalInner = document.getElementById('add-modal-inner');
  if (modalIds.includes(el.id) && addModalInner) {
    // Hide day popup when keyboard opens for a field
    const dayPopup = document.getElementById('day-popup');
    if (dayPopup) {
      dayPopup.style.transition = 'opacity 0.2s';
      dayPopup.style.opacity = '0';
      dayPopup.style.pointerEvents = 'none';
    }
    // Measure after keyboard has slid in
    setTimeout(() => {
      const kbEl = isTime
        ? document.getElementById('kb-time')
        : document.getElementById('keyboard');
      const kbHeight = kbEl ? kbEl.getBoundingClientRect().height : 380;
      const modalHeight = addModalInner.getBoundingClientRect().height;
      const viewportHeight = window.innerHeight;
      const availableSpace = viewportHeight - kbHeight;
      const topMargin = 20; // minimum gap from top of screen
      // How much to shift: modal bottom is at viewport bottom naturally,
      // we want it to end at (viewportHeight - kbHeight)
      let shift = kbHeight;
      // If modal would go off the top, clamp it
      if (modalHeight > availableSpace - topMargin) {
        shift = viewportHeight - modalHeight - topMargin;
        if (shift < 0) shift = kbHeight; // fallback
      }
      addModalInner.style.transition = 'transform 0.28s cubic-bezier(0.32,0.72,0,1)';
      addModalInner.style.transform = 'translateY(-' + shift + 'px)';
    }, 50);
  }
}

function timeUpdatePreview() {
  const el = kbTarget;
  const val = el ? (el.value || '') : '';
  const preview = document.getElementById('kb-time-preview');
  if (preview) preview.textContent = val || '--:-- --';

}

  let digits = el.value.replace(/\s*(am|pm)$/i, '').trimEnd();

  timeAmPmButtons('AM');
  timeUpdatePreview();
}

// Returns just the digit string (no AM/PM, no colon) from current value
function timeGetDigits(val) {
  return val.replace(/\s*(am|pm)/gi, '').replace(':', '').trim();
}

function timeKey(k) {
  if (!kbTarget) return;
  const el = kbTarget;
  const raw = el.value || '';

  const ampmMatch = raw.match(/\s*(am|pm)$/i);
  const ampm = ampmMatch ? ampmMatch[0].trim().toUpperCase() : null;
  let digits = timeGetDigits(raw);

  if (k === 'DEL') {
    if (digits.length === 0) return;
    digits = digits.slice(0, -1);
  } else if (/[0-9]/.test(k)) {
    if (digits.length >= 4) return;
    digits = digits + k;
  } else {
    return;
  }

  // Always colon after 2 digits
  let formatted = digits.length <= 2 ? digits : digits.slice(0, 2) + ':' + digits.slice(2);
  if (ampm) formatted += ' ' + ampm;

  el.value = formatted;
  el.dispatchEvent(new Event('input', {bubbles: true}));
  timeUpdatePreview();
}

function dismissKeyboard() {
  // Validate and finalise time field on Done
  if (kbTarget && kbTarget.id === 'event-time') {
    const raw = kbTarget.value || '';
    const ampmMatch = raw.match(/\s*(am|pm)$/i);
    const ampm = ampmMatch ? ampmMatch[0].trim().toUpperCase() : 'AM';
    const digits = timeGetDigits(raw);

    if (digits.length > 0) {
      if (digits.length < 4) {
        // Not enough digits
        showToast('Not a real time — use 4 digits e.g. 09:30');
        return;
      }

      const h = parseInt(digits.slice(0, 2), 10);
      const m = parseInt(digits.slice(2, 4), 10);

      // Convert 24h → 12h
      if (h >= 13 && h <= 23) {
        kbTarget.value = (h - 12) + ':' + String(m).padStart(2, '0') + ' PM';
      } else if (h === 0) {
        kbTarget.value = '12:' + String(m).padStart(2, '0') + ' AM';
      } else if (h > 23 || m > 59) {
        showToast('Not a real time');
        return;
      } else {
        // Valid 12h time — ensure leading zero for single-digit hours
        kbTarget.value = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ' ' + ampm;
      }
      kbTarget.dispatchEvent(new Event('input', {bubbles: true}));
      timeUpdatePreview();
    }
  }

  document.getElementById('kb-overlay').classList.remove('active');
  document.getElementById('keyboard').classList.remove('active');
  document.getElementById('kb-time').classList.remove('active');
  kbTarget = null;

  // Reset chat input area position
  const chatArea = document.querySelector('.chat-input-area');
  if (chatArea) {
    chatArea.style.transition = 'bottom 0.28s cubic-bezier(0.32,0.72,0,1)';
    chatArea.style.bottom = '80px';
  }
  const msgs = document.getElementById('chat-messages');
  if (msgs) {
    msgs.style.paddingBottom = '100px';
    msgs.scrollTop = msgs.scrollHeight;
  }

  // Reset add modal position
  const addModalInner = document.getElementById('add-modal-inner');
  if (addModalInner) addModalInner.style.transform = 'translateY(0)';

  // Restore day popup to above-add-modal position if add modal still open
  const dayPopup = document.getElementById('day-popup');
  if (dayPopup) {
    const addModal = document.getElementById('add-modal-overlay');
    dayPopup.style.transition = 'opacity 0.2s';
    dayPopup.style.pointerEvents = '';
    if (addModal && addModal.style.display === 'flex') {
      dayPopup.style.opacity = '1';
    } else {
      dayPopup.style.opacity = '1';
    }
  }
}

function attachKeyboard(el) {
  if (el.dataset.kbAttached) return;
  el.dataset.kbAttached = 'true';
  el.setAttribute('readonly', 'readonly');
  el.setAttribute('inputmode', 'none');

  const modalIds = ['event-title', 'event-date', 'event-time', 'event-notes'];

  function handleFocus(e) {
    e.preventDefault();
    e.stopPropagation();

    // If keyboard already open and both old and new targets are modal fields,
    // just swap target without closing — no animation flicker
    if (kbTarget && kbTarget !== el && modalIds.includes(el.id) && modalIds.includes(kbTarget.id)) {
      // Remove highlight from old
      if (kbTarget.classList && kbTarget.classList.contains('form-input')) {
        kbTarget.style.borderColor = '';
      }
      kbTarget = el;
      const isTime = el.id === 'event-time';
      // Swap which keyboard is shown
      document.getElementById('keyboard').classList.toggle('active', !isTime);
      document.getElementById('kb-time').classList.toggle('active', isTime);
      if (isTime) {
        const val = el.value || '';
        const hasPM = /pm/i.test(val);
        const amBtn = document.getElementById('kb-am-btn');
        const pmBtn = document.getElementById('kb-pm-btn');
        if (amBtn && pmBtn) {
          amBtn.style.background = !hasPM ? '#0A84FF' : 'rgba(44,44,46,0.8)';
          amBtn.style.borderColor = !hasPM ? '#0A84FF' : 'rgba(255,255,255,0.15)';
          amBtn.style.color = !hasPM ? '#fff' : 'rgba(255,255,255,0.4)';
          pmBtn.style.background = hasPM ? '#0A84FF' : 'rgba(44,44,46,0.8)';
          pmBtn.style.borderColor = hasPM ? '#0A84FF' : 'rgba(255,255,255,0.15)';
          pmBtn.style.color = hasPM ? '#fff' : 'rgba(255,255,255,0.4)';
        }
        const digits = timeGetDigits(val);
        const ampmSection = document.getElementById('kb-ampm-section');
        if (ampmSection) {
          const hVal = digits.length >= 2 ? parseInt(digits.slice(0, 2), 10) : 0;
          ampmSection.style.display = (digits.length >= 2 && hVal > 12) ? 'none' : 'flex';
        }
        timeUpdatePreview();
      }
      updateKbPreview();
      // Re-measure and reposition modal for new keyboard
      const addModalInner = document.getElementById('add-modal-inner');
      if (addModalInner) {
        setTimeout(() => {
          const kbEl = isTime ? document.getElementById('kb-time') : document.getElementById('keyboard');
          const kbHeight = kbEl ? kbEl.getBoundingClientRect().height : 380;
          const modalHeight = addModalInner.getBoundingClientRect().height;
          const viewportHeight = window.innerHeight;
          const topMargin = 20;
          let shift = kbHeight;
          if (modalHeight > viewportHeight - kbHeight - topMargin) {
            shift = viewportHeight - modalHeight - topMargin;
            if (shift < 0) shift = kbHeight;
          }
          addModalInner.style.transform = 'translateY(-' + shift + 'px)';
        }, 50);
      }
      return;
    }

    showKeyboard(el);
  }

  el.addEventListener('touchstart', handleFocus, {passive: false});
  el.addEventListener('click', handleFocus);
}

function initKeyboard() {
  buildKeyboard();
  document.querySelectorAll('input[type="text"], textarea').forEach(attachKeyboard);
}

// Re-run keyboard attachment whenever page changes
(function() {
  const _prev = window.showPage;
  window.showPage = function(page) {
    _prev(page);
    setTimeout(() => {
      document.querySelectorAll('input[type="text"], textarea').forEach(attachKeyboard);
    }, 100);
  };
})();

setTimeout(initKeyboard, 400);

// ===== SWIPE NAVIGATION =====
const PAGE_ORDER = ['calendar', 'home', 'chat'];
let touchStartX = 0;
let touchStartY = 0;
let currentPageIndex = 1;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});

document.addEventListener('touchend', e => {
  if (document.getElementById('keyboard').classList.contains('active')) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
  if (dx < 0 && currentPageIndex < PAGE_ORDER.length - 1) { currentPageIndex++; showPage(PAGE_ORDER[currentPageIndex]); }
  else if (dx > 0 && currentPageIndex > 0) { currentPageIndex--; showPage(PAGE_ORDER[currentPageIndex]); }
}, {passive: true});

// Patch showPage to also update swipe index — wraps whatever the current window.showPage is
(function() {
  const _prev = window.showPage;
  window.showPage = function(page) {
    const idx = PAGE_ORDER.indexOf(page);
    if (idx !== -1) currentPageIndex = idx;
    _prev(page);
  };
})();

</script>

</div>

      <button class="kb-key tk" onclick="timeKey('5')">5</button>
      <button class="kb-key tk" onclick="timeKey('6')">6</button>

      <button class="kb-key tk" onclick="timeKey('8')">8</button>
      <button class="kb-key tk" onclick="timeKey('9')">9</button>
      <button class="kb-key tk" onclick="timeKey('0')">0</button>
      <button class="kb-key tk dark" onclick="timeKey('DEL')">⌫</button>
    </div>

    <div id="kb-ampm-section" style="display:flex;flex-direction:column;gap:10px;width:130px;">
      <button id="kb-am-btn" onclick="timeSetAmPm('AM')" style="height:72px;border-radius:14px;border:2px solid #0A84FF;background:#0A84FF;color:#fff;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;cursor:pointer;touch-action:manipulation;transition:all 0.15s;">AM</button>
      <button id="kb-pm-btn" onclick="timeSetAmPm('PM')" style="height:72px;border-radius:14px;border:2px solid rgba(255,255,255,0.15);background:rgba(44,44,46,0.8);color:rgba(255,255,255,0.4);font-family:'Syne',sans-serif;font-size:22px;font-weight:800;cursor:pointer;touch-action:manipulation;transition:all 0.15s;">PM</button>
      <button onclick="timeClear()" style="height:52px;border-radius:14px;border:0.5px solid rgba(255,69,58,0.3);background:rgba(255,69,58,0.1);color:#FF453A;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;margin-top:4px;">Clear</button>
    </div>

  </div>
</div>
